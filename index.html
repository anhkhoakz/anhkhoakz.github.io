<!DOCTYPE html>
<html>

<head>
  <title>NgocAnhBeo</title>
  <style>
    body {
      pointer-events: none;
    }

    #container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    p {
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      animation: blink 2s infinite;
      font-size: 69px;
      margin: 0;
    }

    @keyframes blink {
      0% {
        color: red;
      }

      25% {
        color: blue;
      }

      50% {
        color: yellow;
      }

      75% {
        color: green;
      }

      100% {
        color: red;
      }
    }
  </style>
</head>

<body>
  <div id="container">
    <p>Nguyễn Ngọc Anh Béo.</p>
    <iframe
      src="https://www.random.org/widgets/integers/iframe.php?title=True+Random+Number+Generator&amp;buttontxt=Generate&amp;width=160&amp;height=235&amp;border=on&amp;bgcolor=%23FFFFFF&amp;txtcolor=%23777777&amp;altbgcolor=%23CCCCFF&amp;alttxtcolor=%23000000&amp;defaultmin=&amp;defaultmax=&amp;fixed=off"
      frameborder="0" width="160" height="235" style="min-height:235px;" scrolling="no">
    </iframe>
  </div>
</body>

</html>
